name: Build Offline Package (Windows)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload to latest release'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Git Bash
        run: |
          git config --global core.autocrlf false

      - name: Download model from GitHub Release
        shell: bash
        run: |
          echo "=========================================="
          echo "  Downloading Qwen2.5-1.5B Model"
          echo "=========================================="

          mkdir -p llm/models
          cd llm/models

          # Download all parts
          echo "📦 Downloading part 1/3 (500MB)..."
          curl -L -o part1.bin \
            "https://github.com/SonicBotMan/openclaw-portable/releases/download/v6.0.0/qwen-model-part1.bin"

          echo "📦 Downloading part 2/3 (500MB)..."
          curl -L -o part2.bin \
            "https://github.com/SonicBotMan/openclaw-portable/releases/download/v6.0.0/qwen-model-part2.bin"

          echo "📦 Downloading part 3/3 (66MB)..."
          curl -L -o part3.bin \
            "https://github.com/SonicBotMan/openclaw-portable/releases/download/v6.0.0/qwen-model-part3.bin"

          # Merge parts
          echo "🔧 Merging parts..."
          cat part1.bin part2.bin part3.bin > qwen2.5-1.5b-instruct-q4_k_m.gguf

          # Clean up
          rm -f part*.bin

          # Verify
          SIZE=$(du -h qwen2.5-1.5b-instruct-q4_k_m.gguf | cut -f1)
          echo "✅ Model downloaded and merged: $SIZE"

      - name: Build offline package
        shell: bash
        env:
          SKIP_MODEL_DOWNLOAD: 'true'
        run: |
          echo "=========================================="
          echo "  Building OpenClaw Portable v6.0.0"
          echo "  Platform: Windows x64"
          echo "=========================================="

          # Make script executable
          chmod +x build-offline-package.sh

          # Run build script (skip model download)
          ./build-offline-package.sh

      - name: Get package info
        id: package
        shell: bash
        run: |
          FILE=$(ls dist/*.tar.gz | head -1)
          SIZE=$(du -h "$FILE" | cut -f1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "=========================================="
          echo "  ✅ Build Complete!"
          echo "=========================================="
          echo "  File: $FILE"
          echo "  Size: $SIZE"

      - name: Upload to Release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_release == 'true')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v6.0.0
          files: ${{ steps.package.outputs.file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-offline-package
          path: ${{ steps.package.outputs.file }}
          retention-days: 30
          compression-level: 0  # Already compressed
