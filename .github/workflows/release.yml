name: Build & Release v5.0 Offline Package

on:
  push:
    tags: ['v5.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v5.0.0)'
        required: true
        default: 'v5.0.0'

permissions:
  contents: write

env:
  NODE_VERSION: "22.16.0"
  OPENCLAW_VERSION: "latest"

jobs:
  build-offline-package:
    name: Build Windows Offline Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Node.js for Windows
        run: |
          mkdir -p dist/OpenClaw-Portable-windows
          NODE_URL="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip"
          echo "Downloading Node.js ${NODE_VERSION}..."
          curl -fsSL "$NODE_URL" -o node-win.zip
          unzip -q node-win.zip
          mv "node-v${NODE_VERSION}-win-x64" dist/OpenClaw-Portable-windows/node
          rm node-win.zip
          echo "✓ Node.js downloaded"
      
      - name: Install OpenClaw
        run: |
          mkdir -p dist/OpenClaw-Portable-windows/openclaw-pkg
          echo "Installing OpenClaw..."
          node dist/OpenClaw-Portable-windows/node/node_modules/npm/bin/npm-cli.js \
            install -g openclaw \
            --prefix dist/OpenClaw-Portable-windows/openclaw-pkg \
            --registry https://registry.npmmirror.com
          echo "✓ OpenClaw installed"
      
      - name: Copy scripts and configs
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          
          # 复制脚本
          cp start.bat stop.bat check.bat dist/OpenClaw-Portable-windows/
          
          # 复制配置
          cp -r config dist/OpenClaw-Portable-windows/
          
          # 创建数据目录
          mkdir -p dist/OpenClaw-Portable-windows/data
          mkdir -p dist/OpenClaw-Portable-windows/workspace
          mkdir -p dist/OpenClaw-Portable-windows/temp
          
          # 创建版本信息文件
          echo "OpenClaw Portable v5.0.0" > dist/OpenClaw-Portable-windows/VERSION
          echo "Node.js: ${NODE_VERSION}" >> dist/OpenClaw-Portable-windows/VERSION
          echo "OpenClaw: ${OPENCLAW_VERSION}" >> dist/OpenClaw-Portable-windows/VERSION
          echo "Build Date: $(date -u +%Y-%m-%d)" >> dist/OpenClaw-Portable-windows/VERSION
          echo "Build Type: Offline Package" >> dist/OpenClaw-Portable-windows/VERSION
          
          echo "✓ Scripts and configs copied"
      
      - name: Create offline package
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          cd dist
          zip -r "OpenClaw-Portable-${VERSION}-windows-offline.zip" OpenClaw-Portable-windows/
          SIZE=$(du -h "OpenClaw-Portable-${VERSION}-windows-offline.zip" | cut -f1)
          echo "PACKAGE_SIZE=${SIZE}" >> $GITHUB_ENV
          echo "PACKAGE_NAME=OpenClaw-Portable-${VERSION}-windows-offline.zip" >> $GITHUB_ENV
          echo "✓ Package created: ${SIZE}"
      
      - name: Generate checksum
        run: |
          cd dist
          sha256sum OpenClaw-Portable-*-offline.zip > checksums.sha256
          echo "✓ Checksum generated"
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/OpenClaw-Portable-*-offline.zip
            dist/checksums.sha256
          generate_release_notes: false
          body: |
            ## 🚀 OpenClaw Portable v5.0 - 完全离线版本
            
            ### ✨ 新特性
            
            - **完全离线运行** - 无需任何网络连接
            - **预置 Node.js 22.16.0** - 已包含在包中
            - **预置 OpenClaw** - 已包含在包中
            - **零配置启动** - 解压后双击 start.bat 即可
            
            ### 📦 包含内容
            
            | 组件 | 版本 | 大小 |
            |------|------|------|
            | Node.js | 22.16.0 | ~30MB |
            | OpenClaw | Latest | ~30MB |
            | 启动脚本 | v5.0 | <1MB |
            
            ### 📥 下载
            
            - **Windows**: `OpenClaw-Portable-v5.0.0-windows-offline.zip`
            - **大小**: ${{ env.PACKAGE_SIZE }}
            
            ### ✅ 验证
            
            ```bash
            sha256sum -c checksums.sha256
            ```
            
            ### 🚀 使用方法
            
            1. 下载并解压到 U 盘
            2. 双击 `start.bat`
            3. 访问 http://localhost:18789
            
            **无需联网！**
      
      - name: Upload artifact (for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: offline-package
          path: dist/OpenClaw-Portable-*-offline.zip
