<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Portable - 配置面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .hint {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
        }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 30px 0;
        }
        .current-config {
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .current-config h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }
        .config-item:last-child {
            border-bottom: none;
        }
        .config-label {
            color: #6b7280;
        }
        .config-value {
            color: #111827;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 OpenClaw 配置面板</h1>
        <p class="subtitle">配置默认模型和 API 设置</p>

        <div class="current-config" id="currentConfig">
            <h3>当前配置</h3>
            <div id="configDisplay">
                <p style="color: #999;">加载中...</p>
            </div>
        </div>

        <div class="divider"></div>

        <form id="configForm">
            <div class="form-group">
                <label for="provider">模型厂商</label>
                <select id="provider" required>
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="google">Google (Gemini)</option>
                    <option value="zhipu">智谱 AI (GLM)</option>
                    <option value="deepseek">DeepSeek</option>
                    <option value="moonshot">Moonshot (Kimi)</option>
                    <option value="custom">自定义</option>
                </select>
            </div>

            <div class="form-group">
                <label for="model">模型名称</label>
                <input type="text" id="model" placeholder="例如: gpt-4o, claude-3-opus, glm-4" required>
                <p class="hint">输入模型的实际名称，如 gpt-4o、claude-3-5-sonnet-20241022</p>
            </div>

            <div class="form-group">
                <label for="apiType">API 类型</label>
                <select id="apiType" required>
                    <option value="openai-chat">OpenAI Chat (标准)</option>
                    <option value="openai-completions">OpenAI Completions</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="google-generativeai">Google Generative AI</option>
                </select>
            </div>

            <div class="form-group">
                <label for="apiUrl">API 地址</label>
                <input type="url" id="apiUrl" placeholder="https://api.openai.com/v1" required>
                <p class="hint">完整的 API 基础地址，如 https://api.openai.com/v1</p>
            </div>

            <div class="form-group">
                <label for="apiKey">API Key / Token</label>
                <input type="password" id="apiKey" placeholder="sk-..." required>
                <p class="hint">您的 API 密钥，将被安全保存</p>
            </div>

            <button type="submit" class="btn btn-primary">💾 保存配置</button>
            <button type="button" class="btn btn-success" id="restartBtn">🔄 保存并重启 Gateway</button>
        </form>

        <div class="status" id="status"></div>
    </div>

    <script>
        // 预设配置
        const presets = {
            openai: {
                apiUrl: 'https://api.openai.com/v1',
                apiType: 'openai-chat',
                model: 'gpt-4o'
            },
            anthropic: {
                apiUrl: 'https://api.anthropic.com',
                apiType: 'anthropic',
                model: 'claude-3-5-sonnet-20241022'
            },
            google: {
                apiUrl: 'https://generativelanguage.googleapis.com/v1beta',
                apiType: 'google-generativeai',
                model: 'gemini-1.5-pro'
            },
            zhipu: {
                apiUrl: 'https://open.bigmodel.cn/api/paas/v4',
                apiType: 'openai-chat',
                model: 'glm-4'
            },
            deepseek: {
                apiUrl: 'https://api.deepseek.com/v1',
                apiType: 'openai-chat',
                model: 'deepseek-chat'
            },
            moonshot: {
                apiUrl: 'https://api.moonshot.cn/v1',
                apiType: 'openai-chat',
                model: 'moonshot-v1-8k'
            }
        };

        // 加载当前配置
        async function loadConfig() {
            try {
                const configPath = '../data/.openclaw/openclaw.json';
                const response = await fetch(configPath);
                if (response.ok) {
                    const config = await response.json();
                    const display = document.getElementById('configDisplay');
                    
                    const modelConfig = config.agents?.defaults?.modelConfig || {};
                    
                    display.innerHTML = `
                        <div class="config-item">
                            <span class="config-label">模型厂商</span>
                            <span class="config-value">${document.getElementById('provider').options[document.getElementById('provider').selectedIndex]?.text || '未设置'}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label">模型名称</span>
                            <span class="config-value">${modelConfig.model || '未设置'}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label">API 类型</span>
                            <span class="config-value">${modelConfig.api || '未设置'}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label">API 地址</span>
                            <span class="config-value">${modelConfig.baseUrl || '未设置'}</span>
                        </div>
                    `;

                    // 填充表单
                    if (modelConfig.model) document.getElementById('model').value = modelConfig.model;
                    if (modelConfig.api) document.getElementById('apiType').value = modelConfig.api;
                    if (modelConfig.baseUrl) document.getElementById('apiUrl').value = modelConfig.baseUrl;
                }
            } catch (e) {
                console.log('无法加载配置文件，将使用默认值');
            }
        }

        // 厂商选择变化时
        document.getElementById('provider').addEventListener('change', function() {
            const preset = presets[this.value];
            if (preset) {
                document.getElementById('apiUrl').value = preset.apiUrl;
                document.getElementById('apiType').value = preset.apiType;
                document.getElementById('model').value = preset.model;
            }
        });

        // 生成配置文件内容
        function generateConfig() {
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;
            const apiType = document.getElementById('apiType').value;
            const apiUrl = document.getElementById('apiUrl').value;
            const apiKey = document.getElementById('apiKey').value;

            return {
                gateway: {
                    mode: "local"
                },
                agents: {
                    defaults: {
                        modelConfig: {
                            api: apiType,
                            baseUrl: apiUrl,
                            model: model
                        }
                    },
                    providers: {
                        [provider]: {
                            api: apiType,
                            baseUrl: apiUrl,
                            models: [
                                {
                                    name: model,
                                    apiKey: apiKey
                                }
                            ]
                        }
                    }
                }
            };
        }

        // 显示状态消息
        function showStatus(message, isSuccess) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + (isSuccess ? 'success' : 'error');
        }

        // 下载配置文件
        document.getElementById('configForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const config = generateConfig();
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'openclaw.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus('✅ 配置文件已生成！请将下载的 openclaw.json 文件复制到 data\\.openclaw\\ 目录下，然后运行 restart.bat 重启 Gateway。', true);
        });

        // 保存并重启
        document.getElementById('restartBtn').addEventListener('click', function() {
            const config = generateConfig();
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'openclaw.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus('✅ 配置文件已生成！\n\n下一步操作：\n1. 将下载的 openclaw.json 复制到 data\\.openclaw\\\n2. 运行 restart.bat 重启 Gateway', true);

            // 尝试打开 restart.bat
            setTimeout(() => {
                if (confirm('是否立即打开 restart.bat？')) {
                    window.location.href = '../restart.bat';
                }
            }, 1000);
        });

        // 页面加载时
        loadConfig();
    </script>
</body>
</html>
